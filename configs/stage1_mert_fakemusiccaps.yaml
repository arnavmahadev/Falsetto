# Stage-1 AudioCAT on MERT features, FakeMusicCaps 10 s clips.
# Only fields that differ from falsetto.config defaults need to appear here.
name: stage1_mert_fakemusiccaps
seed: 42
device: auto
tracker: tensorboard

data:
  dataset: fakemusiccaps
  root: data/raw/fakemusiccaps
  manifest: data/manifests/fakemusiccaps.csv
  clip_seconds: 10.0
  batch_size: 8
  augment: true          # SSL-only pitch/time-stretch on the train split

extractor:
  name: mert
  pretrained: m-a-p/MERT-v1-95M
  sample_rate: 24000
  embed_dim: 768
  returns_sequence: true
  layer_strategy: weighted   # learnable weighted sum over MERT's 13 layers
  freeze: true

model:
  name: audiocat
  d_model: 256
  n_heads: 8
  n_layers: 6
  num_latents: 8
  dropout: 0.1

train:
  epochs: 40
  lr: 1.0e-5
  weight_decay: 1.0e-6
  optimizer: adam
  loss: bce
  amp: true
  early_stopping: true
  patience: 8
  monitor: auc
  monitor_mode: max
